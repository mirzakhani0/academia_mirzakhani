<mat-sidenav-container class="student-layout" autosize>
  <!-- Sidebar -->
  <mat-sidenav #sidenav mode="side" opened class="student-sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-text">MIRZAKHANI</span>
      </div>
      <button mat-icon-button (click)="sidenav.toggle()" class="close-btn">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/estudiante/dashboard" routerLinkActive="active" class="nav-item">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a routerLink="/estudiante/mis-cursos" routerLinkActive="active" class="nav-item">
        <mat-icon>school</mat-icon>
        <span>Mis Cursos</span>
      </a>
      <a routerLink="/estudiante/biblioteca" routerLinkActive="active" class="nav-item">
        <mat-icon>menu_book</mat-icon>
        <span>Biblioteca</span>
      </a>
      <a routerLink="/estudiante/perfil" routerLinkActive="active" class="nav-item">
        <mat-icon>person</mat-icon>
        <span>Perfil</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button mat-button class="logout-btn" routerLink="/inicio">
        <mat-icon>logout</mat-icon>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content class="student-content">
    <!-- Topbar -->
    <header class="student-topbar">
      <div class="left-section">
        <button mat-icon-button (click)="sidenav.toggle()" class="menu-btn">
          <mat-icon>menu</mat-icon>
        </button>
        <h1 class="page-title">{{ pageTitle }}</h1>
      </div>

      <div class="right-section">
        <button mat-icon-button class="notification-btn">
          <mat-icon>notifications</mat-icon>
          <span class="badge">3</span>
        </button>
        
        <div class="user-menu">
          <div class="user-avatar">
            <mat-icon>person</mat-icon>
          </div>
          <span class="user-name">Estudiante</span>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="student-main">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
