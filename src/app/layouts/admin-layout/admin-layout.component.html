<mat-sidenav-container class="admin-layout" autosize>
  <!-- Sidebar -->
  <mat-sidenav #sidenav mode="side" opened class="admin-sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <mat-icon class="logo-icon">admin_panel_settings</mat-icon>
        <span class="logo-text">ADMIN</span>
      </div>
      <button mat-icon-button (click)="sidenav.toggle()" class="close-btn">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <mat-icon>analytics</mat-icon>
        <span>Dashboard</span>
      </a>
      <a routerLink="/admin/cursos" routerLinkActive="active" class="nav-item">
        <mat-icon>class</mat-icon>
        <span>Cursos</span>
      </a>
      <a routerLink="/admin/usuarios" routerLinkActive="active" class="nav-item">
        <mat-icon>people</mat-icon>
        <span>Usuarios</span>
      </a>
      <a routerLink="/admin/contenido" routerLinkActive="active" class="nav-item">
        <mat-icon>folder</mat-icon>
        <span>Contenido</span>
      </a>
      <a routerLink="/admin/reportes" routerLinkActive="active" class="nav-item">
        <mat-icon>assessment</mat-icon>
        <span>Reportes</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button mat-button class="logout-btn" routerLink="/inicio">
        <mat-icon>logout</mat-icon>
        <span>Salir del Admin</span>
      </button>
    </div>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content class="admin-content">
    <!-- Topbar -->
    <header class="admin-topbar">
      <div class="left-section">
        <button mat-icon-button (click)="sidenav.toggle()" class="menu-btn">
          <mat-icon>menu</mat-icon>
        </button>
        <h1 class="page-title">{{ pageTitle }}</h1>
      </div>

      <div class="right-section">
        <div class="admin-profile">
          <div class="admin-avatar">
            <mat-icon>admin_panel_settings</mat-icon>
          </div>
          <div class="admin-info">
            <span class="admin-name">Administrador</span>
            <span class="admin-role">Super Admin</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="admin-main">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>

<style>
